name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Test
        run: uv run pytest tests/ -q --tb=short

      - name: Coverage
        run: |
          uv run pytest tests/ --cov=energo --cov-report=term-missing -q
